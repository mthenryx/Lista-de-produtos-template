<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Simples</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <header>Matheus store</header>
    <div class="container">
        <h2>Informática</h2>
        <div class="products">
            <div class="card">
                <img src="./img/icone-informatica.png" class="selo" alt="selo informatica">
                <img src="./img/smartwatch-samsung-galaxy-watch-3.png" alt="Produto">
                <h3>Notebook</h3>
                <p>Notebook com ótimo desempenho para estudos.</p>
                <div class="price">R$ 3.000</div>
                <span>★★★☆☆</span>
            </div>
        </div>
        <h2>Eletrônicos</h2>
        <div class="products">
            <div class="card">
                <img src="./img/icone-eletronico.png" class="selo" alt="selo eletronico">
                <img src="./img/caixa-de-som-jbl-flip-5.png" alt="Produto">
                <h3>Fone Bluetooth</h3>
                <p>Som de alta qualidade e bateria duradoura.</p>
                <div class="price">R$ 200</div>
                <span>★★★☆☆</span>
            </div>
        </div>
    </div>
</body>
</html>
